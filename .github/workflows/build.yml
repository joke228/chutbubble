name: Real Java Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile and Pack
        run: |
          # Скачиваем API через проверенное зеркало
          curl -sL https://github.com -o spigot.jar
          mkdir -p out
          # Компилируем по-настоящему
          javac -cp spigot.jar src/main/java/net/chatbubbles/LightChatBubbles.java -d out
          cp src/main/resources/plugin.yml out/
          cd out
          jar cvf ../LightChatBubbles.jar *

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Working-Plugin
          path: LightChatBubbles.jar
