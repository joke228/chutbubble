name: Ultimate Search Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Locate and Build
        run: |
          # Ищем файлы, где бы они ни были
          JAVA_FILE=$(find . -name "LightChatBubbles.java" | head -n 1)
          PLUGIN_FILE=$(find . -name "plugin.yml" | head -n 1)
          
          echo "Found Java at: $JAVA_FILE"
          echo "Found Plugin at: $PLUGIN_FILE"
          
          mkdir -p out/net/chatbubbles
          
          # Копируем их в правильную структуру для JAR
          cp "$JAVA_FILE" out/net/chatbubbles/
          cp "$PLUGIN_FILE" out/
          
          # Собираем
          cd out
          jar cvf ../LightChatBubbles.jar *

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Final-Plugin-Jar
          path: LightChatBubbles.jar