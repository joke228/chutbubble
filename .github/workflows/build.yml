name: Final Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Manually
        run: |
          # Скачиваем API напрямую через системную ссылку
          curl -L "https://spigotmc.org" -o spigot-api.jar
          # Компилируем
          mkdir -p out
          javac -cp spigot-api.jar src/main/java/net/chatbubbles/LightChatBubbles.java -d out
          # Копируем конфиг
          cp src/main/resources/plugin.yml out/
          # Собираем JAR
          cd out
          jar cvf ../LightChatBubbles.jar *

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Final-Plugin-Jar
          path: LightChatBubbles.jar